<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>TFT AI</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 600;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .chat {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 10px;
      max-width: 80%;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      line-height: 1.5;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: #f3f4f6;
      color: #111827;
    }

    .input-area {
      border-top: 1px solid #e5e7eb;
      padding: 12px;
      display: flex;
      justify-content: center;
    }

    .input-box {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      resize: none;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
    }

    textarea:focus {
      border-color: #111827;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #374151;
    }

    .upload-btn {
      background: #6b7280;
    }

    .upload-btn:hover {
      background: #4b5563;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }

    .left-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .right-actions {
      display: flex;
      gap: 6px;
    }

    .file-btn {
      cursor: pointer;
      font-size: 18px;
      padding: 6px 8px;
      border-radius: 6px;
    }

    .file-btn:hover {
      background: #f3f4f6;
    }

    .file-name {
      font-size: 12px;
      color: #c70e08;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div class="header">🎮 TFT AI Assistant</div>

  <div class="chat-container">
    <div id="chat" class="chat"></div>
  </div>

  <div class="input-area">
    <div class="input-box">

      <textarea id="input" rows="2" placeholder="Hỏi về đội hình, item..."></textarea>

      <div class="actions">
        <div class="left-actions">
          <label for="imageInput" class="file-btn">📎</label>
          <span id="fileName" class="file-name"></span>
          <input type="file" id="imageInput" hidden />
        </div>

        <div class="right-actions">
          <button onclick="sendImage()">📷</button>
          <button onclick="sendMessage()">Gửi</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const ASK_API = "/ask";
    const IMAGE_API = "/analyze-image";

    function addMessage(text, type) {
      const chat = document.getElementById("chat");

      const msg = document.createElement("div");
      msg.className = "message " + type;
      msg.innerText = text;

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const chat = document.getElementById("chat");

      const msg = document.createElement("div");
      msg.className = "message bot typing";
      msg.id = "typing";
      msg.innerText = "AI đang suy nghĩ...";

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value;

      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      showTyping();

      try {
        const res = await fetch(ASK_API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question: text })
        });

        const data = await res.json();

        removeTyping();
        typeEffect(data.answer || "Không có trả lời");

      } catch (err) {
        removeTyping();
        addMessage("Lỗi server", "bot");
      }
    }

    async function sendImage() {
      const file = document.getElementById("imageInput").files[0];

      if (!file) {
        alert("Chọn ảnh trước");
        return;
      }

      addMessage("📷 Đang gửi ảnh...", "user");
      showTyping();

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch(IMAGE_API, {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        removeTyping();

        const text =
          "📊 Game State:\n" +
          JSON.stringify(data.game_state, null, 2) +
          "\n\n🔥 Strategy:\n" +
          data.strategy;

        typeEffect(text);

      } catch (err) {
        removeTyping();
        addMessage("Lỗi upload ảnh", "bot");
      }
    }

    // 🔥 typing effect giống ChatGPT
    function typeEffect(text) {
      const chat = document.getElementById("chat");

      const msg = document.createElement("div");
      msg.className = "message bot";
      chat.appendChild(msg);

      let i = 0;
      function typing() {
        if (i < text.length) {
          msg.innerText += text.charAt(i);
          i++;
          setTimeout(typing, 10);
        }
      }

      typing();
    }

    document.getElementById("input").addEventListener("keypress", function (e) {
      if (e.key === "Enter") sendMessage();
    });
    const imageInput = document.getElementById("imageInput");
    const fileName = document.getElementById("fileName");

    imageInput.addEventListener("change", () => {
      if (imageInput.files.length > 0) {
        fileName.innerText = imageInput.files[0].name;
      } else {
        fileName.innerText = "";
      }
    });
  </script>

</body>

</html>
